# Qidi Max3 - MyMod Configuration — DUAL heater (EBB2209 CAN bus toolhead)
# ──────────────────────────────────────────────────────────────────────────────
# EBB2209/RP2040 CAN toolhead + ESP32-C3 secondary hotend controller.
# Use Qidi-Max3-MyMod-EBB-RP-single.cfg instead when the 2nd heater is removed.
#
# Included from root printer.cfg — [mcu] and Adaptive_Mesh are loaded there.

# Shared modules (all in this same directory)
[include Qidi-Max3-kinematics.cfg]
[include Qidi-Max3-heaters.cfg]
[include Qidi-Max3-fans.cfg]
[include Qidi-Max3-sensors.cfg]
[include Qidi-max3-macros.cfg]

# Toolhead: EBB2209 + RP2040 via CAN bus
[include Qidi-Max3-EBB2209-RP2040.cfg]

# Secondary hotend controller (ESP32-C3 via I2C through EBBCan)
[include ESP-PT1000-2.cfg]

