[mcu EBBCan]
canbus_uuid: 11aa22bb33cc  # Replace with your actual UUID from canbus_query.py

[extruder]
step_pin: EBBCan:gpio18
dir_pin: EBBCan:gpio19  # Adjust ! if direction is reversed
enable_pin: !EBBCan:gpio17
rotation_distance: 53.5  #22.6789511	#Bondtech 5mm Drive Gears
gear_ratio: 1628:170				
microsteps: 16
full_steps_per_rotation: 200	#200 for 1.8 degree, 400 for 0.9 degree
nozzle_diameter: 0.400
filament_diameter: 1.75
min_temp: 0
max_temp: 360
min_extrude_temp: 170
smooth_time: 0.000001
heater_pin: EBBCan:gpio7
sensor_type:MAX6675
sensor_pin:EBBCan:gpio9  # CS - adjust if wired differently
spi_speed: 100000
spi_software_sclk_pin:EBBCan:gpio10
spi_software_mosi_pin:EBBCan:gpio11
spi_software_miso_pin:EBBCan:gpio8
max_power: 1.0
control : pid  
pid_Kp=14.734
pid_Ki=6.549 
pid_Kd=8.288
pressure_advance: 0.032
pressure_advance_smooth_time: 0.03
max_extrude_cross_section:500
instantaneous_corner_velocity: 10.000
max_extrude_only_distance: 120.0
max_extrude_only_velocity:5000
max_extrude_only_accel:2000
step_pulse_duration:0.000002

[tmc2209 extruder]
uart_pin: EBBCan:gpio20
interpolate: True
run_current: 0.714
#hold_current: 0.5
#sense_resistor: 0.110
stealthchop_threshold: 0

[adxl345]
cs_pin: EBBCan:gpio1
spi_software_sclk_pin: EBBCan:gpio2
spi_software_mosi_pin: EBBCan:gpio0
spi_software_miso_pin: EBBCan:gpio3
axes_map: -x, z, -y  # Test and adjust based on resonance_tester output

[heater_fan hotend_fan]
pin:EBBCan:gpio14
max_power: 1.0
kick_start_time: 0.5
heater: extruder
heater_temp: 50.0
fan_speed: 1.0
off_below: 0

[heater_fan hotend_fan2]
pin:EBBCan:gpio13
max_power: 1.0
kick_start_time: 0.5
heater: extruder
heater_temp: 50.0
fan_speed: 1.0
off_below: 0

[output_pin fan0]
pin: EBBCan:gpio6
pwm: True
cycle_time: 0.0100
hardware_pwm: false
value: 0
scale: 255
shutdown_value: 0.0

[probe]
pin: ^!EBBCan:gpio22
x_offset: 28
y_offset: 4.4
z_offset: 0.0
speed: 5
samples: 2
samples_result: average
sample_retract_dist: 3.0
samples_tolerance: 0.08
samples_tolerance_retries:3
