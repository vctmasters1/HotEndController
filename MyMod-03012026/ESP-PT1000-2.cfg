# ─────────────────────────────────────────────────────────────
# ESP32-C3 Independent Hotend Controller — Klipper Configuration
# ─────────────────────────────────────────────────────────────
# DUAL-HEATER SETUP: The primary extruder heater is still used
# normally via Klipper (M104/M109). This config drives a second,
# independent heater via an ESP32-C3 over I2C through the
# EBB2209 (RP2040) toolhead CAN-bus MCU.
#
# The ESP32-C3 independently:
#   - Reads actual temp from its own PT1000 (ADC)
#   - Runs PID heater control via LEDC PWM (MOSFET on GPIO10)
#   - Displays set/actual temps on its built-in OLED
#   - Reports actual temp back to Klipper via I2C read
#
# Hotend2 actual temp is visible in Fluidd/Mainsail dashboard
# and can be waited on with WAIT_HOTEND2 or M109_HOTEND2.
#
# PREREQUISITES
#   1. Copy esp32_temp_display.py to:
#        ~/klipper/klippy/extras/esp32_temp_display.py
#
#   2. Wire EBBCan gpio4 (SDA) and gpio5 (SCL) to the ESP32-C3
#      GPIO8 (SDA) and GPIO9 (SCL).  Share GND.
#      See ../ESP32C3wOLED/pinout.md for the full wiring diagram.
#
#   3. Add 4.7 kΩ pull-ups on SDA & SCL to 3.3 V unless your
#      dev boards already have them on-board.
#
#   4. Include this file from your main printer.cfg:
#        [include ESP-PT1000-2.cfg]
#
# COMMANDS (from Fluidd / Mainsail console):
#   SET_HOTEND2_TEMP S=200   ; set secondary hotend to 200°C
#   SET_HOTEND2_TEMP          ; query current temps (no param)
#   HOTEND2_OFF              ; turn it off
#   M104_HOTEND2 S=200       ; non-blocking set (like M104)
#   M109_HOTEND2 S=200       ; blocking wait (like M109)
#   WAIT_HOTEND2             ; wait for current target ±3°C
#   WAIT_HOTEND2 TOLERANCE=5 TIMEOUT=300  ; custom tolerance/timeout
# ─────────────────────────────────────────────────────────────

[esp32_temp_display]
i2c_mcu: EBBCan
i2c_software_sda_pin: EBBCan:gpio4
i2c_software_scl_pin: EBBCan:gpio5
i2c_address: 80               # 0x50 — must match I2C_SLAVE_ADDR in firmware
update_interval: 1.0           # seconds — also acts as I2C watchdog keep-alive

# ─────────────────────────────────────────────────────────────
# Convenience macros — use M104-style syntax for the 2nd hotend
# ─────────────────────────────────────────────────────────────

[gcode_macro M104_HOTEND2]
description: Set secondary hotend temperature (M104_HOTEND2 S=200)
gcode:
    {% set s = params.S|default(0)|float %}
    SET_HOTEND2_TEMP S={s}

[gcode_macro M109_HOTEND2]
description: Set secondary hotend temp and wait until reached (like M109)
gcode:
    {% set s = params.S|default(0)|float %}
    SET_HOTEND2_TEMP S={s}
    {% if s > 0 %}
        WAIT_HOTEND2
    {% endif %}
