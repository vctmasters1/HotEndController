# Qidi Max3 - Board-Level Fans & Output Pins
# Fans and output pins on the MKS SKIPR main board (shared between Stock and MyMod)
# Toolhead-specific fans (hotend_fan, hotend_fan2, fan0) are in the toolhead config

## Main board turbine fan
[output_pin fan2]
pin: PA8
pwm: True
cycle_time: 0.0100
hardware_pwm: false
value: 0.00
scale: 255
shutdown_value: 0.0

## Carbon filter fan
[output_pin fan3]
pin: PC9
pwm: True
cycle_time: 0.0100
hardware_pwm: false
value: 0.0
scale: 255
shutdown_value: 0.0

## Board cooling fan (auto on when extruder > 50C)
[heater_fan borad_fan]
pin: PC4
max_power: 1.0
kick_start_time: 0.5
heater: extruder
heater_temp: 50.0
fan_speed: 1.0
off_below: 0

## Case LED lighting
[output_pin caselight]
pin: PC7
pwm: false
shutdown_value: 0
value: 1

## Beeper
[output_pin beeper]
pin: PA2
pwm: false
shutdown_value: 0
value: 0

## Power control
[output_pin pwc]
pin: PA3
pwm: False
value: 1
shutdown_value: 1

## Sound toggle (used by beep_on / beep_off macros)
[output_pin sound]
pin: PA13
value: 0
