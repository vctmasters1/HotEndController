# Qidi Max3 - Modular Configuration Entry Point
# ================================================
#
# MKS SKIPR (STM32F407) main board.
# Firmware: compile for stm32f407, 48KiB bootloader, Serial on USART1 PA10/PA9.
# Flash: copy out/klipper.bin → mks_skipr.bin on SD card, then reboot.
#
# INSTRUCTIONS: Uncomment exactly ONE configuration option below.
#   - "Factory" is the original monolithic config (standalone, no other includes needed).
#   - "MyMod" and "Stock" use the modular split and need the shared section below.

# =====================================================================
# OPTION A: Factory — original unmodified Qidi config (standalone)
#   If using this, comment out the entire "Shared resources" section below.
# =====================================================================
#[include Factory/printer.cfg]

# =====================================================================
# OPTION B / C / D: Modular configs (MyMod or Stock)
#   These require the shared resources below to be uncommented.
# =====================================================================

# --- Shared resources (needed by MyMod and Stock, NOT by Factory) ---
[include Factory/Adaptive_Mesh.cfg]

[mcu]
serial: /dev/ttyS0
restart_method: command

# --- Select ONE modular configuration ---

# MyMod (dual heater): EBB2209 CAN toolhead + ESP32-C3 secondary hotend
[include MyMod-03012026/Qidi-Max3-MyMod-EBB-RP-main.cfg]

# MyMod (single heater): EBB2209 CAN toolhead only — no ESP32 hotend2
#[include MyMod-03012026/Qidi-Max3-MyMod-EBB-single.cfg]

# Stock: Original MKS_THR RP2040 USB toolhead (modular split)
#[include MyMod-03012026/Qidi-Max3-STOCK-main.cfg]
